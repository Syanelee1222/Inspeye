<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .notify {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      max-width: 400px;
      background: linear-gradient(135deg, rgba(30,30,40,0.92) 0%, rgba(20,20,30,0.95) 100%);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: auto;
      cursor: default;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translate(-50%, -50%) translateX(40px); }
      to   { opacity: 1; transform: translate(-50%, -50%) translateX(0); }
    }
    .notify-icon {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #60a5fa;
      margin-right: 8px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.3); }
    }
    .notify-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }
    .notify-body {
      font-size: 12.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="notify">
    <div class="notify-title">
      <span class="notify-icon"></span>
      <span id="titleEl">InspEye</span>
    </div>
    <div class="notify-body" id="bodyEl"></div>
  </div>
</body>
</html>
